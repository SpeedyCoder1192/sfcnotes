title: SFC™ Notes

permalink: /:slug

favicon: "./logo.png"

remote_theme: abhinavs/moonwalk

theme_config:
  appearance: "dark"
  appearance_toggle: true
  back_home_text: "🏠 Home"
  date_format: "%Y-%m-%d"
  show_description: true
  show_navbar: true
  show_footer: false
  show_copyright: false
  show_projects: false
  show_blog: false
  show_old_projects: false
  show_misc_list: false
  show_reading_time: false
  show_tags: false
  home:
    title_projects: Portfolio
    title_misc_list: Details
    title_blog: Blog
    title_old_projects: Old Projects

highlighter: rouge

sass:
  style: :compressed

plugins:
  - jekyll-feed